services:
  jenkins:
    image: custom-jenkins:lts
    container_name: jenkins

    ports:
      - "8080:8080"
      - "50000:50000"

    volumes:
      - jenkins_home:/var/jenkins_home
      - /run/host-services/docker.proxy.sock:/var/run/docker.sock



    restart: unless-stopped

volumes:
  jenkins_home:
    external: true
